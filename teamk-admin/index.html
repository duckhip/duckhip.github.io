<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#123746">
  <title>Team-K 모바일 관리자</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div><span class="eyebrow">TEAM-K</span><h1>모바일 관리자</h1></div>
    <button id="logoutButton" class="ghost" hidden>로그아웃</button>
  </header>

  <main>
    <section id="loginView" class="card login-card">
      <h2>관리자 로그인</h2>
      <p class="muted">Google Sheets에 설정한 관리자 암호를 입력하세요.</p>
      <form id="loginForm">
        <label>스프레드시트 URL 또는 ID
          <input id="spreadsheetInput" autocomplete="off" required>
        </label>
        <label>관리자 암호
          <input id="passwordInput" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary" type="submit">로그인</button>
      </form>
    </section>

    <section id="adminView" hidden>
      <div class="toolbar card">
        <label>게임일자
          <select id="gameDateSelect"></select>
        </label>
        <button id="newGameButton" class="secondary">새 게임</button>
        <button id="refreshButton" class="ghost">새로고침</button>
      </div>

      <section class="summary-grid">
        <article><span>전체</span><strong id="totalCount">0</strong></article>
        <article><span>입금</span><strong id="paidCount">0</strong></article>
        <article><span>게임비 합계</span><strong id="gameFeeTotal">0원</strong></article>
        <article><span>필드 입금비</span><strong id="fieldPaymentTotal">0원</strong></article>
      </section>

      <section class="card">
        <div class="section-head"><h2>게임 정보</h2><span id="revisionBadge" class="badge">rev 0</span></div>
        <div class="form-grid">
          <label>게임일자<input id="gameDate" type="date"></label>
          <label>필드명<input id="gameField"></label>
          <label>게임비<input id="gameFee" type="number" inputmode="numeric"></label>
          <label class="wide">입금계좌<input id="gameAccount"></label>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>출석자 <small id="attendeeCount"></small></h2>
          <button id="addAttendeeButton" class="secondary">추가</button>
        </div>
        <input id="attendeeSearch" class="search" placeholder="이름 검색">
        <div id="attendeeList" class="attendee-list"></div>
      </section>

      <section class="card">
        <div class="section-head"><h2>QR 출석 관리</h2><span id="qrStatus" class="badge">미설정</span></div>
        <p id="qrMeta" class="muted">선택한 날짜의 QR 상태를 확인하세요.</p>
        <div class="button-grid">
          <button id="startQrButton" class="primary">접수 시작</button>
          <button id="renewQrButton" class="secondary">새 QR 발급</button>
          <button id="closeQrButton" class="danger">접수 마감</button>
          <button id="copyQrButton" class="ghost">QR 주소 복사</button>
          <button id="importPendingButton" class="secondary wide">새 등록 받기 <span id="pendingCount">0</span></button>
        </div>
      </section>

      <div class="save-bar">
        <span id="dirtyState">저장된 상태</span>
        <button id="saveButton" class="primary">서버 저장</button>
      </div>
    </section>
  </main>

  <dialog id="attendeeDialog">
    <form id="attendeeForm" method="dialog">
      <h2 id="attendeeDialogTitle">출석자 추가</h2>
      <input id="attendeeId" type="hidden">
      <label>성명<input id="attendeeName" required></label>
      <label class="check"><input id="attendeePaid" type="checkbox"> 입금완료</label>
      <label class="check"><input id="attendeeMinor" type="checkbox"> 소인</label>
      <label>비고<input id="attendeeNote"></label>
      <div class="dialog-actions">
        <button id="deleteAttendeeButton" type="button" class="danger" hidden>삭제</button>
        <button type="button" class="ghost" data-close-dialog>취소</button>
        <button type="submit" class="primary">적용</button>
      </div>
    </form>
  </dialog>

  <div id="message" class="message" hidden></div>
  <script src="./domain.js"></script>
  <script src="./api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
