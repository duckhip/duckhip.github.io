<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d6598">
  <title>Team-K 모바일 출석</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #183042;
      --muted: #667784;
      --line: #d9e2e8;
      --brand: #1685c5;
      --brand-dark: #0d6598;
      --success: #238636;
      --danger: #b42318;
      --canvas: #edf5f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(10px, env(safe-area-inset-top)) 10px max(16px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at top right, rgba(22, 133, 197, 0.18), transparent 34%),
        linear-gradient(180deg, #f8fcff, var(--canvas));
      color: var(--ink);
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .shell {
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .brand {
      margin: 2px 0 8px;
      text-align: center;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      margin-bottom: 4px;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--brand), var(--brand-dark));
      color: #fff;
      font-size: 25px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(13, 101, 152, 0.23);
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card {
      overflow: hidden;
      border: 1px solid rgba(217, 226, 232, 0.9);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 45px rgba(42, 75, 94, 0.12);
    }

    .game-info {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .game-item {
      min-width: 0;
      padding: 9px 10px;
      background: #f7fbfd;
    }

    .game-item.account {
      white-space: nowrap;
    }

    .label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .value {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.88rem;
      font-weight: 700;
    }

    form {
      padding: 12px 14px 14px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .required {
      color: var(--danger);
      font-size: 0.82em;
    }

    input[type="text"] {
      width: 100%;
      min-height: 49px;
      padding: 12px 13px;
      border: 1px solid #bfcbd3;
      border-radius: 11px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(22, 133, 197, 0.13);
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 9px 0;
      color: #405463;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .check-row input {
      width: 20px;
      height: 20px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--brand);
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 5px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff;
      font: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 9px 20px rgba(13, 101, 152, 0.2);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.58;
    }

    .message {
      display: none;
      margin: 16px 18px 0;
      padding: 13px;
      border-radius: 11px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .message.visible {
      display: block;
    }

    .message.error {
      background: #fff0ee;
      color: var(--danger);
    }

    .message.success {
      background: #eaf7ed;
      color: var(--success);
    }

    .message.info {
      background: #eef7fc;
      color: var(--brand-dark);
    }

    .saved-profile {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 18px 18px;
      padding: 12px;
      border: 1px solid #cfe1eb;
      border-radius: 11px;
      background: #f4fafc;
      color: #46606f;
      font-size: 0.84rem;
    }

    .saved-profile.visible {
      display: flex;
    }

    .saved-profile button {
      width: auto;
      min-height: 34px;
      margin: 0;
      padding: 6px 10px;
      border: 1px solid #b9cbd5;
      background: #fff;
      color: #506674;
      font-size: 0.78rem;
      box-shadow: none;
    }

    .privacy {
      margin: 9px 2px 0;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 360px) {
      .game-item {
        padding: 8px;
      }

      .value {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="brand">
      <div class="brand-mark">K</div>
      <h1>Team-K 모바일 출석</h1>
      <p class="subtitle">스마트폰에서 간편하게 참석 정보를 등록하세요.</p>
    </header>

    <section class="card" aria-live="polite">
      <div id="message" class="message info visible">출석 정보를 확인하고 있습니다.</div>

      <div id="gameInfo" class="game-info" hidden>
        <div class="game-item">
          <span class="label">게임일자</span>
          <span id="gameDate" class="value"></span>
        </div>
        <div class="game-item">
          <span class="label">필드명</span>
          <span id="gameField" class="value"></span>
        </div>
        <div class="game-item">
          <span class="label">게임비</span>
          <span id="gameFee" class="value"></span>
        </div>
        <div class="game-item account">
          <span class="label">입금계좌</span>
          <span id="gameAccount" class="value"></span>
        </div>
      </div>

      <form id="attendanceForm" hidden>
        <div class="field">
          <label for="name">성명 <span class="required">(필수)</span></label>
          <input id="name" type="text" maxlength="30" autocomplete="name" placeholder="이름을 입력하세요" required>
        </div>
        <label class="check-row">
          <input id="minor" type="checkbox">
          <span>소인을 함께 등록합니다.</span>
        </label>
        <label class="check-row">
          <input id="remember" type="checkbox" checked>
          <span>다음 출석 때 이름을 자동으로 입력합니다.</span>
        </label>
        <button id="submitButton" type="submit">출석 등록</button>
        <p class="privacy">저장 동의를 선택하면 이름이 이 스마트폰의 브라우저에만 저장됩니다. 공용 기기에서는 선택을 해제하세요.</p>
      </form>

      <div id="savedProfile" class="saved-profile">
        <span>저장된 사용자 정보가 적용되었습니다.</span>
        <button id="clearProfileButton" type="button">저장정보 삭제</button>
      </div>
    </section>
  </main>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPgkd98ZVALSGfY5Z9Q0KbRx1gyo2etlioTR6fpFKmyzO6JbFwQh626L4gCHqtaRxt/exec';
    const PROFILE_KEY = 'teamk_mobile_attendance_profile_v1';
    const query = new URLSearchParams(window.location.search);
    const attendance = {
      spreadsheetId: query.get('spreadsheetId') || '',
      date: query.get('date') || '',
      token: query.get('token') || ''
    };

    const form = document.getElementById('attendanceForm');
    const message = document.getElementById('message');
    const submitButton = document.getElementById('submitButton');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type} visible`;
      message.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function readJsonResponse(response) {
      if (!response.ok) {
        throw new Error(`서버 응답 오류 (${response.status})`);
      }
      return response.text().then(text => {
        try {
          return JSON.parse(text);
        } catch (error) {
          throw new Error('서버 응답을 확인할 수 없습니다.');
        }
      });
    }

    function requestAttendanceInfo() {
      const params = new URLSearchParams({
        action: 'mobile_attendance_info',
        spreadsheetId: attendance.spreadsheetId,
        date: attendance.date,
        token: attendance.token,
        timestamp: Date.now().toString()
      });
      return fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, {
        cache: 'no-store',
        credentials: 'omit',
        redirect: 'follow'
      }).then(readJsonResponse);
    }

    function submitAttendance(payload) {
      return fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        credentials: 'omit',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      }).then(readJsonResponse);
    }

    function readSavedProfile() {
      try {
        const profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null');
        if (!profile) return;
        document.getElementById('name').value = profile.name || '';
        document.getElementById('savedProfile').classList.add('visible');
      } catch (error) {
        localStorage.removeItem(PROFILE_KEY);
      }
    }

    function clearSavedProfile() {
      localStorage.removeItem(PROFILE_KEY);
      document.getElementById('name').value = '';
      document.getElementById('savedProfile').classList.remove('visible');
    }

    function renderAttendanceInfo(result) {
      if (!result.success) {
        throw new Error(result.error || '출석 정보를 확인할 수 없습니다.');
      }
      document.getElementById('gameDate').textContent = result.date || attendance.date;
      document.getElementById('gameField').textContent = result.field || '-';
      document.getElementById('gameFee').textContent = result.fee ? `${result.fee}원` : '-';
      document.getElementById('gameAccount').textContent = result.account || '-';
      document.getElementById('gameInfo').hidden = false;
      if (!result.open) {
        showMessage(result.message || '모바일 출석 접수가 마감되었습니다.', 'error');
        return;
      }
      message.className = 'message';
      form.hidden = false;
      readSavedProfile();
      document.getElementById('name').focus();
    }

    function initialize() {
      if (!attendance.spreadsheetId || !attendance.date || !attendance.token) {
        showMessage('QR 주소에 필요한 정보가 없습니다. 운영진에게 새 QR을 요청해주세요.', 'error');
        return;
      }
      requestAttendanceInfo()
        .then(renderAttendanceInfo)
        .catch(error => showMessage(error.message || '출석 정보를 불러오지 못했습니다.', 'error'));
    }

    document.getElementById('clearProfileButton').addEventListener('click', clearSavedProfile);

    document.addEventListener('pointerdown', event => {
      const nameInput = document.getElementById('name');
      if (document.activeElement === nameInput && event.target !== nameInput) {
        nameInput.blur();
      }
    });

    form.addEventListener('submit', event => {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      if (!name) {
        showMessage('성명을 입력해주세요.', 'error');
        document.getElementById('name').focus();
        return;
      }
      submitButton.disabled = true;
      submitButton.textContent = '등록 중...';
      submitAttendance({
        type: 'submit_mobile_attendance',
        spreadsheetId: attendance.spreadsheetId,
        date: attendance.date,
        token: attendance.token,
        name,
        team: 'TeamK',
        minor: document.getElementById('minor').checked,
        note: ''
      }).then(result => {
        if (!result.success) {
          throw new Error(result.error || '출석 등록에 실패했습니다.');
        }
        if (document.getElementById('remember').checked) {
          localStorage.setItem(PROFILE_KEY, JSON.stringify({
            name
          }));
        } else {
          localStorage.removeItem(PROFILE_KEY);
        }
        submitButton.textContent = '등록 완료';
        showMessage('출석 등록이 완료되었습니다. 운영진 출석부에 곧 반영됩니다.', 'success');
        form.querySelectorAll('input, button').forEach(element => {
          element.disabled = true;
        });
      }).catch(error => {
        submitButton.disabled = false;
        submitButton.textContent = '출석 등록';
        showMessage(error.message || '통신 중 오류가 발생했습니다.', 'error');
      });
    });

    initialize();
  </script>
</body>
</html>
